---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: arch
    image: jahrik/docker-archlinux-ansible
    pre_build_image: true
    pull: true
  - name: ubuntu
    image: geerlingguy/docker-ubuntu2604-ansible
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    host_vars:
      arch:
        ansible_user: ansible
verifier:
  name: ansible
