---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check polybar binary
      ansible.builtin.command: which polybar
      changed_when: false
      failed_when: false
      register: polybar_bin

    - name: Assert polybar is installed
      ansible.builtin.assert:
        that: polybar_bin.rc == 0
        fail_msg: "polybar binary not found in PATH"

    - name: Run polybar --version
      ansible.builtin.command: polybar --version
      register: polybar_version
      changed_when: false

    - name: Assert polybar version output
      ansible.builtin.assert:
        that: "'polybar' in polybar_version.stdout | lower"
        fail_msg: "polybar --version did not produce expected output"

    - name: Check polybar config
      ansible.builtin.stat:
        path: ~/.config/polybar/config
      register: polybar_cfg

    - name: Assert polybar config exists
      ansible.builtin.assert:
        that: polybar_cfg.stat.exists
        fail_msg: "polybar config not found at ~/.config/polybar/config"

    - name: Check polybar launch script
      ansible.builtin.stat:
        path: ~/.config/polybar/launch.sh
      register: polybar_launch

    - name: Assert launch.sh exists and is executable
      ansible.builtin.assert:
        that:
          - polybar_launch.stat.exists
          - polybar_launch.stat.executable
        fail_msg: "~/.config/polybar/launch.sh not found or not executable"
