---
- name: Uninstall polybar (Debian)
  become: true
  ansible.builtin.apt:
    name: polybar
    state: absent
  when: ansible_os_family == 'Debian'

- name: Uninstall polybar (Arch)
  become: true
  community.general.pacman:
    name: polybar
    state: absent
  when: ansible_os_family == 'Archlinux'

- name: Remove ~/.config/polybar
  become: false
  ansible.builtin.file:
    path: "~/.config/polybar/"
    state: absent
  tags: ['polybar']
