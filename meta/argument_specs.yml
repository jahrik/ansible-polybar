---
argument_specs:
  main:
    short_description: Install and configure polybar
    options:
      install:
        type: bool
        default: true
        description: Set to false to uninstall polybar and remove its config
      polybar:
        type: dict
        description: Polybar package settings
        default:
          version: 3.5.7
        options:
          version:
            type: str
            default: 3.5.7
            description: Version installed from source on Debian/Ubuntu; Arch always installs latest from AUR
