---
- name: Install polybar
  ansible.builtin.include_tasks: install.yml
  when: install | default(true) | bool
  tags:
    - polybar
    - polybar:install

- name: Uninstall polybar
  ansible.builtin.include_tasks: uninstall.yml
  when: not (install | default(true) | bool)
  tags:
    - polybar
    - polybar:uninstall
