---
- name: Install polybar (Debian)
  ansible.builtin.include_tasks: debian.yml
  when: ansible_facts['os_family'] == 'Debian'

- name: Install polybar (Arch)
  ansible.builtin.include_tasks: archlinux.yml
  when: ansible_facts['os_family'] == 'Archlinux'

- name: Create ~/.config/polybar
  become: false
  ansible.builtin.file:
    path: "~/.config/polybar/"
    state: directory
    mode: '0755'
  tags: ['polybar']

- name: Generate polybar config
  become: false
  ansible.builtin.template:
    src: config.j2
    dest: ~/.config/polybar/config
    mode: '0644'
  tags: ['polybar']

- name: Generate polybar launch script
  become: false
  ansible.builtin.template:
    src: launch.sh.j2
    dest: ~/.config/polybar/launch.sh
    mode: '0755'
  tags: ['polybar']
